<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Proxy Saloon</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#130d09;
    --panel:#241710;
    --panel2:#36231a;
    --gold:#c59a52;
    --gold-dark:#8d6632;
    --paper:#e2d2b0;
    --red:#7d1e1e;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background:
        radial-gradient(circle at top, rgba(125,30,30,.25), transparent 40%),
        linear-gradient(to bottom,#1a120d,#0d0907);
    color:var(--paper);
    font-family:"Cinzel", serif;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    margin:0;
    font-size:3rem;
    letter-spacing:4px;
    color:var(--gold);
    text-transform:uppercase;
    text-shadow:
        0 0 10px rgba(197,154,82,.4),
        2px 2px 0 #000;
}

.subtitle{
    margin-top:10px;
    color:#b89b72;
    letter-spacing:2px;
}

.board{
    background:
        linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
        linear-gradient(135deg,var(--panel),var(--panel2));
    border:3px solid var(--gold-dark);
    border-radius:12px;
    padding:25px;
    box-shadow:
        0 0 40px rgba(0,0,0,.6),
        inset 0 0 30px rgba(0,0,0,.4);
}

.proxy{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;

    margin-bottom:12px;
    padding:14px 18px;

    text-decoration:none;
    color:var(--paper);

    border:1px solid rgba(197,154,82,.25);
    border-radius:8px;

    background:
        linear-gradient(
            90deg,
            rgba(125,30,30,.35),
            rgba(0,0,0,.15)
        );

    transition:.25s;
}

.proxy:hover{
    transform:translateX(8px);
    border-color:var(--gold);
    box-shadow:
        0 0 15px rgba(197,154,82,.35);
}

.badge{
    background:var(--red);
    color:#fff4d6;
    padding:6px 12px;
    border-radius:20px;
    font-size:.85rem;
    font-weight:bold;
}

.proxy-text{
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.loading{
    text-align:center;
    color:var(--gold);
    padding:30px;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#8f7856;
    font-size:.9rem;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Telegram Proxy Saloon</h1>
        <div class="subtitle">
            WANTED: A RELIABLE CONNECTION
        </div>
    </div>

    <div class="board">
        <div id="proxy-list" class="loading">
            Loading proxies...
        </div>
    </div>

    <div class="footer">
        Ride into Telegram by choosing a proxy below.
    </div>

</div>

<script>
const url =
"https://raw.githubusercontent.com/Argh94/Proxy-List/refs/heads/main/MTProto.txt";

fetch(url)
.then(r => r.text())
.then(text => {

    const container =
        document.getElementById("proxy-list");

    const proxies = text
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(x => x.startsWith("tg://proxy"));

    container.innerHTML = "";

    proxies.forEach((proxy, i) => {

        const link =
            document.createElement("a");

        link.href = proxy;
        link.className = "proxy";

        link.innerHTML = `
            <span class="badge">#${i + 1}</span>
            <span class="proxy-text">${proxy}</span>
        `;

        container.appendChild(link);
    });

    if (!proxies.length) {
        container.innerHTML =
            '<div class="loading">No proxies found.</div>';
    }
})
.catch(() => {
    document.getElementById("proxy-list").innerHTML =
        '<div class="loading">Failed to load proxy list.</div>';
});
</script>

</body>
</html>
