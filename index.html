    font-family:"Cinzel", serif;

    font-weight:600;

    transition:0.2s;
}

    transform:translateY(-2px);

<div class="container">

    <div class="header">
        <h1>Telegram Proxy Saloon</h1>
        <div class="subtitle">
            WANTED: A RELIABLE CONNECTION
        </div>
    </div>

    <div class="board">
        <div id="proxy-list" class="loading">
            Loading proxies...
        </div>
    </div>

    <div class="footer">
        Ride into Telegram by choosing a proxy below.
    </div>

</div>

<script>
const url =
"https://raw.githubusercontent.com/Argh94/Proxy-List/refs/heads/main/MTProto.txt";

fetch(url)
.then(r => r.text())
.then(text => {

    const container =
        document.getElementById("proxy-list");

    const proxies = text
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(x => x.startsWith("tg://proxy"));

    container.innerHTML = "";

proxies.forEach((proxy, i) => {
    const link = document.createElement("a");

    link.href = proxy;
    link.className = "proxy";
    link.textContent = `Proxy ${i + 1}`;

    link.addEventListener("click", () => {
        link.classList.add("clicked");
    });

    container.appendChild(link);
});

    if (!proxies.length) {
        container.innerHTML =
            '<div class="loading">No proxies found.</div>';
    }
})
.catch(() => {
    document.getElementById("proxy-list").innerHTML =
        '<div class="loading">Failed to load proxy list.</div>';
});
</script>
