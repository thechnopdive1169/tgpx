<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Proxy List</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
}

.proxy {
    display: block;
    margin: 6px 0;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    text-decoration: none;
    color: #0066cc;
    word-break: break-all;
}

.proxy:hover {
    background: #f5f5f5;
}
</style>
</head>
<body>

<h1>Telegram Proxies</h1>

<div id="proxy-list">Loading...</div>

<script>
const url =
    "https://raw.githubusercontent.com/Argh94/Proxy-List/refs/heads/main/MTProto.txt";

fetch(url)
    .then(res => res.text())
    .then(text => {
        const container = document.getElementById("proxy-list");

        const proxies = text
            .split(/\r?\n/)
            .map(x => x.trim())
            .filter(x => x.startsWith("tg://proxy"));

        container.innerHTML = "";

        proxies.forEach((proxy, index) => {
            const a = document.createElement("a");
            a.href = proxy;
            a.className = "proxy";
            a.textContent = `Proxy ${index + 1}`;
            container.appendChild(a);
        });

        if (proxies.length === 0) {
            container.textContent = "No proxies found.";
        }
    })
    .catch(err => {
        document.getElementById("proxy-list").textContent =
            "Failed to load proxy list.";
        console.error(err);
    });
</script>

</body>
</html>
